<div class="p-3">
  <p class="panel-section-label">Layers</p>
  @if (sortedLayers().length === 0) {
    <p class="text-xs text-ink-disabled">No layers yet</p>
  } @else {
    <ul class="space-y-0.5">
      @for (layer of sortedLayers(); track layer.id; let i = $index) {
        <li
          draggable="true"
          class="layer-item"
          [class.layer-item-selected]="editorStore.selectedLayerIds().includes(layer.id)"
          [class.border-t-2]="dragOverIndex() === i"
          [class.border-accent]="dragOverIndex() === i"
          [class.opacity-40]="dragOverIndex() !== null && dragOverIndex() !== i"
          (click)="selectLayer(layer.id)"
          (dragstart)="onDragStart($event, i)"
          (dragover)="onDragOver($event, i)"
          (dragleave)="onDragLeave()"
          (drop)="onDrop($event, i)"
          (dragend)="onDragEnd()"
        >
          @if (editorStore.canEdit()) {
            <span class="text-ink-disabled mr-1 cursor-grab select-none text-base leading-none">⠿</span>
          }
          <span class="flex-1 truncate capitalize">{{ layer.type }} {{ i + 1 }}</span>
          @if (editorStore.canEdit()) {
            <button
              class="text-ink-disabled hover:text-danger text-xs ml-2 transition-colors"
              (click)="$event.stopPropagation(); removeLayer(layer.id)"
              title="Delete layer"
            >✕</button>
          }
        </li>
      }
    </ul>
  }
</div>
