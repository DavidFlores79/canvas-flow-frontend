<div class="p-3">
  <p class="panel-section-label">Assets</p>

  @if (editorStore.canEdit()) {
    <label class="block mb-3 cursor-pointer">
      <span class="sr-only">Upload file</span>
      <input
        type="file"
        accept="image/*"
        class="block w-full text-xs text-ink-disabled
               file:mr-2 file:py-1 file:px-3 file:rounded file:border-0
               file:text-xs file:bg-accent-muted file:text-accent-light
               hover:file:bg-accent/30 cursor-pointer"
        (change)="uploadFile($event)"
      />
    </label>
  }

  @if (isLoading()) {
    <p class="text-xs text-ink-disabled">Loading…</p>
  }

  @if (error()) {
    <p class="text-xs text-danger">{{ error() }}</p>
  }

  <p class="text-[11px] text-ink-disabled mb-2">Click an image to add it to the canvas.</p>

  <div class="grid grid-cols-2 gap-2">
    @for (asset of assets(); track asset.id) {
      <div class="relative group aspect-square rounded-md overflow-hidden border border-panel-border hover:border-accent/60 transition-colors">
        <button
          class="w-full h-full"
          [disabled]="!editorStore.canEdit()"
          (click)="addToCanvas(asset)"
        >
          <img [src]="asset.url" [alt]="asset.id" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-200" />
        </button>
        @if (editorStore.canEdit()) {
          <button
            class="absolute top-1 right-1 hidden group-hover:flex items-center justify-center w-5 h-5 rounded-full bg-danger text-white hover:bg-danger/80 disabled:opacity-50 transition-colors"
            [disabled]="deletingId() === asset.id"
            (click)="deleteAsset(asset, $event)"
            title="Delete asset"
          >
            @if (deletingId() === asset.id) {
              <svg class="animate-spin h-3 w-3" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"></path>
              </svg>
            } @else {
              <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
              </svg>
            }
          </button>
        }
      </div>
    }
  </div>
</div>
