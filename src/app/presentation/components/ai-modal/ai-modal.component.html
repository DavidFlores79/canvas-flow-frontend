<div class="fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm" (click)="close()">
  <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg mx-4 overflow-hidden flex flex-col" (click)="$event.stopPropagation()">

    <!-- Header -->
    <div class="bg-gradient-to-r from-purple-600 to-indigo-600 px-5 py-4 flex items-center justify-between">
      <div class="flex items-center gap-2">
        <span class="text-white text-xl">✦</span>
        <span class="text-white font-semibold text-lg">AI Image Generation</span>
      </div>
      <button
        class="text-white/70 hover:text-white hover:bg-white/10 rounded-lg w-8 h-8 flex items-center justify-center transition-colors text-lg leading-none"
        (click)="close()"
      >✕</button>
    </div>

    <!-- Body -->
    <div class="p-6 space-y-5">
      @if (!editorStore.canEdit()) {
        <div class="px-4 py-3 bg-amber-50 border border-amber-200 rounded-xl text-sm text-amber-700 text-center">
          Read-only mode — you cannot generate images in this workspace.
        </div>
      } @else {
        <form [formGroup]="form" (ngSubmit)="generate()" class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1.5">Describe your image</label>
            <textarea
              formControlName="prompt"
              rows="4"
              placeholder="A futuristic city at sunset with neon lights and flying cars…"
              class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm resize-none focus:outline-none focus:ring-2 focus:ring-purple-400 focus:border-transparent transition-all bg-gray-50 focus:bg-white"
            ></textarea>
          </div>

          <button
            type="submit"
            [disabled]="form.invalid || isGenerating()"
            class="w-full py-3 rounded-xl bg-gradient-to-r from-purple-600 to-indigo-600 text-white font-medium hover:from-purple-700 hover:to-indigo-700 shadow-md hover:shadow-lg transition-all flex items-center justify-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed disabled:hover:shadow-md"
          >
            @if (isGenerating()) {
              <span class="inline-block h-4 w-4 animate-spin rounded-full border-2 border-white border-t-transparent"></span>
              <span>Generating… (up to 60s)</span>
            } @else {
              <span>✦</span>
              <span>Generate Image</span>
            }
          </button>
        </form>

        @if (error()) {
          <div class="text-sm text-red-600 bg-red-50 border border-red-200 rounded-xl px-4 py-3">
            {{ error() }}
          </div>
        }

        @if (generatedAssets().length > 0) {
          <div>
            <p class="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-3">Generated Images</p>
            <div class="grid grid-cols-2 gap-3">
              @for (asset of generatedAssets(); track asset.id) {
                <button
                  class="rounded-xl overflow-hidden border-2 border-transparent hover:border-purple-400 transition-all shadow-sm hover:shadow-md aspect-square"
                  (click)="addToCanvas(asset)"
                >
                  <img [src]="asset.url" alt="AI generated" class="w-full h-full object-cover" />
                </button>
              }
            </div>
          </div>
        }
      }
    </div>
  </div>
</div>
