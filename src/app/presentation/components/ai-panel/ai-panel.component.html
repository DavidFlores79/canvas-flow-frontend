<div class="p-4">
  <h3 class="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-3">AI Generate</h3>

  @if (!editorStore.canEdit()) {
    <p class="text-xs text-gray-400">Read-only mode</p>
  } @else {
    <form [formGroup]="form" (ngSubmit)="generate()" class="space-y-3">
      <div>
        <textarea
          formControlName="prompt"
          rows="3"
          placeholder="Describe the image you want to generate…"
          class="w-full text-sm border border-gray-200 rounded-md px-3 py-2 resize-none focus:outline-none focus:ring-2 focus:ring-blue-400"
        ></textarea>
      </div>

      <button
        type="submit"
        [disabled]="form.invalid || isGenerating()"
        class="w-full bg-purple-600 text-white text-sm py-2 rounded-md hover:bg-purple-700 disabled:opacity-50 transition-colors"
      >
        @if (isGenerating()) {
          Generating… (up to 60s)
        } @else {
          Generate
        }
      </button>
    </form>

    @if (error()) {
      <p class="text-xs text-red-500 mt-2">{{ error() }}</p>
    }

    @if (generatedAssets().length > 0) {
      <div class="mt-3 grid grid-cols-2 gap-2">
        @for (asset of generatedAssets(); track asset.id) {
          <button
            class="aspect-square rounded overflow-hidden border border-gray-200 hover:border-purple-400 transition-colors"
            (click)="addToCanvas(asset)"
          >
            <img [src]="asset.url" [alt]="'AI generated'" class="w-full h-full object-cover" />
          </button>
        }
      </div>
    }
  }
</div>
