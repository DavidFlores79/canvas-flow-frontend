<button class="workspace-card" (click)="onSelect()">
  <!-- Gradient thumbnail placeholder -->
  <div class="h-28 bg-gradient-to-br from-accent-muted via-panel to-panel-header flex items-center justify-center">
    <span class="text-2xl text-accent/40 font-bold select-none">{{ workspace.name.charAt(0).toUpperCase() }}</span>
  </div>
  <div class="p-3 flex items-center justify-between gap-2">
    <div>
      <p class="font-semibold text-ink-primary text-sm truncate">{{ workspace.name }}</p>
    </div>
    <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-ink-disabled flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
    </svg>
  </div>
</button>
