<div class="min-h-screen bg-surface">
  <!-- Header -->
  <header class="sticky top-0 z-10 bg-panel-header border-b border-panel-border px-6 py-3 flex items-center justify-between">
    <div class="flex items-center gap-2">
      <img src="logo.png" alt="Canvas Flow" class="h-8 w-8 object-contain" />
      <span class="text-lg font-bold text-ink-primary">Canvas Flow</span>
    </div>
    <div class="flex items-center gap-4">
      <app-theme-toggle />
      <app-org-switcher />
      <span class="text-sm text-ink-secondary">{{ authStore.currentUser()?.email }}</span>
      <button
        class="text-sm text-ink-disabled hover:text-ink-primary transition-colors"
        (click)="signOut()"
      >Sign out</button>
    </div>
  </header>

  <!-- Main content -->
  <main class="max-w-5xl mx-auto p-6">
    <h2 class="text-xl font-semibold text-ink-primary mb-4">Workspaces</h2>

    @if (isLoading()) {
      <p class="text-ink-disabled">Loading workspaces…</p>
    }

    @if (error()) {
      <p class="text-danger">{{ error() }}</p>
    }

    <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4">
      @for (ws of workspaces(); track ws.id) {
        <app-workspace-card [workspace]="ws" (selected)="onWorkspaceSelected($event)" />
      }
    </div>

    @if (!isLoading() && workspaces().length === 0 && !error()) {
      <p class="text-ink-disabled mt-4">No workspaces found.</p>
    }
  </main>
</div>
