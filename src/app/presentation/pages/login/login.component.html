<div class="login-bg min-h-screen flex items-center justify-center relative overflow-hidden">
  <div class="bg-panel border border-panel-border rounded-2xl shadow-float w-full max-w-md mx-4 p-8 relative z-10">
    <div class="flex flex-col items-center mb-6">
      <img src="logo.png" alt="Canvas Flow" class="h-16 w-16 object-contain mb-3" />
      <h1 class="text-2xl font-bold text-ink-primary">Sign in to Canvas Flow</h1>
    </div>

    @if (authStore.error()) {
      <div class="mb-4 p-3 bg-danger/10 border border-danger/30 rounded-lg text-danger text-sm">
        {{ authStore.error() }}
      </div>
    }

    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="mb-4">
        <label for="email" class="block text-sm font-medium text-ink-secondary mb-1">Email</label>
        <input
          id="email"
          type="email"
          formControlName="email"
          class="w-full px-3 py-2 bg-surface border border-panel-border rounded-lg text-ink-primary
                 focus:outline-none focus:ring-2 focus:ring-accent focus:border-accent transition-colors"
          placeholder="you@example.com"
        />
      </div>

      <div class="mb-6">
        <label for="password" class="block text-sm font-medium text-ink-secondary mb-1">Password</label>
        <div class="relative">
          <input
            id="password"
            [type]="showPassword ? 'text' : 'password'"
            formControlName="password"
            class="w-full px-3 py-2 pr-10 bg-surface border border-panel-border rounded-lg text-ink-primary
                   focus:outline-none focus:ring-2 focus:ring-accent focus:border-accent transition-colors"
            placeholder="••••••"
          />
          <button
            type="button"
            (click)="togglePassword()"
            class="absolute inset-y-0 right-0 flex items-center px-3 text-ink-disabled hover:text-ink-secondary transition-colors"
            [attr.aria-label]="showPassword ? 'Hide password' : 'Show password'"
          >
            @if (showPassword) {
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 4.411m0 0L21 21" />
              </svg>
            } @else {
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
              </svg>
            }
          </button>
        </div>
      </div>

      <button
        type="submit"
        [disabled]="form.invalid || authStore.isLoading()"
        class="w-full py-2.5 rounded-lg font-medium text-white transition-all
               bg-gradient-to-r from-accent to-[#312e81]
               hover:from-accent-hover hover:to-[#3730a3]
               disabled:opacity-50 disabled:cursor-not-allowed shadow-md hover:shadow-float"
      >
        @if (authStore.isLoading()) {
          Signing in…
        } @else {
          Sign In
        }
      </button>
    </form>
  </div>
</div>
